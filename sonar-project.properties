# SonarCloud configuration for the apps-team-ts-template monorepo.
#
# Project key and organization are configured in the SonarCloud UI; this
# file only declares source and test path partitioning plus exclusion
# rules so generated code, fixtures, and tooling don't pollute the
# Reliability / Maintainability ratings on the application surface.

# Treat the whole repo as the analysis root; sonar.test.inclusions below
# carves out which files within it are tests.
sonar.sources=.
sonar.tests=.

# Test sources — vitest specs live alongside source files and under
# `tests/`. SonarCloud applies test-specific rules to these (no "should
# not have empty methods" on fixture stubs, etc.) rather than the
# production-code rules.
sonar.test.inclusions=\
  **/test/**,\
  **/tests/**,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Excluded from analysis entirely:
#   - hey-api-generated SDK output (regenerated on every build; the
#     source of truth is the Zod schemas in example-schemas)
#   - compiled dist/ output and node_modules
#   - generator scripts and tooling configs (not runtime code)
#   - changeset markdown entries (not source files)
sonar.exclusions=\
  **/src/generated/**,\
  **/dist/**,\
  **/node_modules/**,\
  **/scripts/**,\
  **/.changeset/**,\
  **/*.config.ts,\
  **/*.config.js,\
  **/eslint.config.js,\
  **/openapi-ts.config.ts,\
  **/openapi.json

# Coverage exclusions — generated code, tests, and tooling files
# should not count against coverage targets.
sonar.coverage.exclusions=\
  **/src/generated/**,\
  **/test/**,\
  **/tests/**,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/scripts/**,\
  **/*.config.ts,\
  **/*.config.js
