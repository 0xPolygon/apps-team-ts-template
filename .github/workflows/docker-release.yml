name: Docker release

on:
  push:
    tags:
      - '*@[0-9]*' # all package version tags (scoped and unscoped)
        # schemas/client packages exit early via should_build=false (no Dockerfile)
  workflow_dispatch:
    inputs:
      tag:
        description: 'Full changeset tag to build (e.g. example-rest-api@1.2.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  docker-release:
    uses: 0xPolygon/apps-team-workflows/.github/workflows/docker-release.yml@main
    secrets: inherit
    with:
      tag: ${{ inputs.tag || '' }}
