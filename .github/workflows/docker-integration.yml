name: Docker integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-integration:
    name: Build and test example-rest-api Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Docker image
        run: |
          docker build \
            -f packages/example-rest-api/Dockerfile \
            -t example-rest-api:ci \
            .

      - name: Start container
        run: |
          docker run -d --name example-rest-api-ci \
            -p 3000:3000 \
            example-rest-api:ci

      - name: Wait for service to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health-check > /dev/null; then
              echo "Service ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Service did not become ready in time"
          docker logs example-rest-api-ci
          exit 1

      - name: Run test suite against container
        run: pnpm --filter example-rest-api test
        env:
          TEST_BASE_URL: http://localhost:3000

      - name: Stop container
        if: always()
        run: docker stop example-rest-api-ci && docker rm example-rest-api-ci
