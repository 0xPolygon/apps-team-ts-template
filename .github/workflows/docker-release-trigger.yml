name: Docker release

on:
  push:
    tags:
      - '*@[0-9]*'
      - '*/*@[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Full changeset tag to build (e.g. example-rest-api@1.2.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Public Ethereum mainnet RPC — no token required. Used here because
      # the template's docker-test job should exercise the canonical test
      # flow with a reliable anonymous endpoint. Real services override
      # this trigger's env block with their own (token-bearing) URLs.
      RPC_URL: https://ethereum-rpc.publicnode.com
      RPC_CHAIN_ID: '1'
      # Auth-gated operations require this header. The CI value is a throwaway
      # placeholder; production deployments inject a real secret via External
      # Secrets Operator.
      MANAGEMENT_API_KEY: ci-test-secret
    outputs:
      image_name: ${{ steps.docker-test.outputs.image_name }}
      image_tag: ${{ steps.docker-test.outputs.image_tag }}
      dockerfile_path: ${{ steps.docker-test.outputs.dockerfile_path }}
      checkout_ref: ${{ steps.docker-test.outputs.checkout_ref }}
      should_build: ${{ steps.docker-test.outputs.should_build }}
    steps:
      # Checkout so docker-compose.yml + the start script are available for the
      # sibling Redis + Firestore emulator (docker-test does its own checkout at
      # the tag ref later). The script publishes their ports and exports
      # REDIS_URL / FIRESTORE_EMULATOR_HOST via the Docker bridge gateway
      # 172.17.0.1 — NOT localhost, which inside the app container is the
      # container itself — so the built image reaches them. Same sibling-
      # container pattern as balance-api / pos-airdrop. The image's
      # cache-aside read path (GET /api/widgets/{id}) needs both reachable.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Start integration test infrastructure
        run: .github/scripts/start-integration-resources.sh 172.17.0.1
      - id: docker-test
        uses: 0xPolygon/pipelines/.github/actions/docker-test@main
        with:
          tag: ${{ inputs.tag || '' }}
          test_vars: RPC_URL RPC_CHAIN_ID MANAGEMENT_API_KEY REDIS_URL REDIS_CLUSTER FIRESTORE_EMULATOR_HOST GOOGLE_CLOUD_PROJECT_ID

  release:
    needs: test
    if: needs.test.outputs.should_build == 'true'
    uses: 0xPolygon/pipelines/.github/workflows/apps-docker-release.yml@main
    with:
      image_name: ${{ needs.test.outputs.image_name }}
      image_tag: ${{ needs.test.outputs.image_tag }}
      dockerfile_path: ${{ needs.test.outputs.dockerfile_path }}
      checkout_ref: ${{ needs.test.outputs.checkout_ref }}
    secrets:
      build_params_gh_secret_keys: ${{ secrets.build_params_gh_secret_keys }}
