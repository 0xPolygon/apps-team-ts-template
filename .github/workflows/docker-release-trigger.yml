name: Docker release

on:
  push:
    tags:
      - '*@[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Full changeset tag to build (e.g. example-rest-api@1.2.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  docker-release:
    uses: 0xPolygon/apps-team-workflows/.github/workflows/docker-release.yml@main
    with:
      tag: ${{ inputs.tag || '' }}
    secrets:
      build_params_gh_secret_keys: ${{ secrets.build_params_gh_secret_keys }}
