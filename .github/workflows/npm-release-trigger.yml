name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    # Shadowing the v2 workflow to validate the pinned, patched `@changesets/cli`
    # release path before the cutover PR in `pipelines` collapses v2 back onto
    # `apps-npm-release.yml`. See 0xPolygon/pipelines#35.
    #
    # TEMPORARY shadow-test ref — points at PR #35's branch so this PR can
    # validate v2 end-to-end before pipelines#35 is merged. Reverted to
    # `@main` once pipelines#35 lands. Final state: this trigger reverts to
    # `apps-npm-release.yml@main` post-cutover with no behaviour change.
    uses: 0xPolygon/pipelines/.github/workflows/apps-npm-release-v2.yml@fix/npm-release-targeted-tag-cleanup
    secrets:
      CHANGESET_RELEASE_BOT_APP_ID: ${{ secrets.CHANGESET_RELEASE_BOT_APP_ID }}
      CHANGESET_RELEASE_BOT_APP_PRIVATE_KEY: ${{ secrets.CHANGESET_RELEASE_BOT_APP_PRIVATE_KEY }}
