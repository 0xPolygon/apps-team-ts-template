packages:
  - 'packages/*'

blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@polygonlabs/*'
  - '@maticnetwork/*'
  - '@agglayer/*'
  - '@0xsequence/*'
  - '@0xtrails/*'
# katex 0.16.34 (transitive dep of markdownlint-cli2) has a broken ESM build
# where __VERSION__ is not replaced at build time, crashing on Node 24.
# js-yaml/markdown-it/bn.js: parents (markdownlint-cli2,
# @hey-api/json-schema-ref-parser, @metamask/number-to-bn) pin exact versions
# with open security advisories; force the patched releases in-major.
overrides:
  katex: ^0.16.38
  'js-yaml@4': ^4.2.0
  'markdown-it@14': ^14.2.0
  'bn.js@5': ^5.2.3
onlyBuiltDependencies:
  - esbuild
trustPolicy: no-downgrade
trustPolicyExclude:
  - 'undici-types@6.19.8'
  - 'semver@6.3.1'
  - '@noble/curves@1.8.0'
  - '@noble/hashes@1.7.0'
  - 'slow-redact@0.3.2'
